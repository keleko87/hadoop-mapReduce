version: "3.9"

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    environment:
      - CLUSTER_NAME=bigdata-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    ports:
      - "9870:9870" ## Interfaz web del NameNode
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - bigdata

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    hostname: resourcemanager
    depends_on:
      - namenode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - YARN_CONF_yarn_resourcemanager_hostname=resourcemanager
      - SERVICE_PRECONDITION=namenode:9870 namenode:9000
    ports:
      - "8088:8088" ## Interfaz web de YARN - ResourceManager
      - "8032:8032"
    networks:
      - bigdata

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode1
    hostname: datanode1
    depends_on:
      - namenode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SERVICE_PRECONDITION=namenode:9870 namenode:9000
    ports:
      - "9864:9864"
    volumes:
      - datanode1_data:/hadoop/dfs/data
    networks:
      - bigdata

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode2
    hostname: datanode2
    depends_on:
      - namenode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SERVICE_PRECONDITION=namenode:9870 namenode:9000
    ports:
      - "9865:9864"
    volumes:
      - datanode2_data:/hadoop/dfs/data
    networks:
      - bigdata

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    hostname: nodemanager
    depends_on:
      - namenode
      - resourcemanager
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - MULTIHOMED_NETWORK=0
      # Refuerzo en servidor YARN para evitar errores
      - MAPRED_CONF_mapreduce_framework_name=yarn
      - MAPRED_CONF_yarn_app_mapreduce_am_env=HADOOP_MAPRED_HOME=/opt/hadoop-3.2.1,HADOOP_COMMON_HOME=/opt/hadoop-3.2.1,HADOOP_HDFS_HOME=/opt/hadoop-3.2.1,HADOOP_YARN_HOME=/opt/hadoop-3.2.1,HADOOP_CONF_DIR=/etc/hadoop,JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64
      - MAPRED_CONF_mapreduce_map_env=HADOOP_MAPRED_HOME=/opt/hadoop-3.2.1,HADOOP_CONF_DIR=/etc/hadoop,JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64
      - MAPRED_CONF_mapreduce_reduce_env=HADOOP_MAPRED_HOME=/opt/hadoop-3.2.1,HADOOP_CONF_DIR=/etc/hadoop,JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64
      - MAPRED_CONF_mapreduce_application_classpath=/opt/hadoop-3.2.1/share/hadoop/mapreduce/*,/opt/hadoop-3.2.1/share/hadoop/mapreduce/lib/*,/opt/hadoop-3.2.1/share/hadoop/common/*,/opt/hadoop-3.2.1/share/hadoop/common/lib/*,/opt/hadoop-3.2.1/share/hadoop/yarn/*,/opt/hadoop-3.2.1/share/hadoop/yarn/lib/*,/opt/hadoop-3.2.1/share/hadoop/hdfs/*,/opt/hadoop-3.2.1/share/hadoop/hdfs/lib/*
      - SERVICE_PRECONDITION=namenode:9870 resourcemanager:8088
    ports:
      - "8042:8042"
    volumes:
      - ./cluster-conf/hadoop-client/yarn-site.xml:/etc/hadoop/yarn-site.xml:ro
    networks:
      - bigdata

  mysql:
    image: mysql:8.0
    container_name: mysql
    hostname: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=sqoop
      - MYSQL_PASSWORD=sqoop
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      #- ./tabla-personas.sql:/docker-entrypoint-initdb.d/01-personas.sql:ro
    networks:
      - bigdata

  sqoop:
    build:
      context: ./sqoop
    container_name: sqoop
    hostname: sqoop
    depends_on:
      - namenode
      - resourcemanager
      - mysql
    environment:
      - HADOOP_HOME=/usr/local/hadoop
      - HADOOP_CONF_DIR=/usr/local/hadoop/etc/hadoop
      - YARN_CONF_DIR=/usr/local/hadoop/etc/hadoop
      - SQOOP_HOME=/usr/local/sqoop
    volumes:
      # Cliente Hadoop (compartible con otros contenedores CLI); no es configuración de Sqoop
      - ./cluster-conf/hadoop-client/core-site.xml:/usr/local/hadoop/etc/hadoop/core-site.xml:ro
      - ./cluster-conf/hadoop-client/mapred-site.xml:/usr/local/hadoop/etc/hadoop/mapred-site.xml:ro
      - ./cluster-conf/hadoop-client/yarn-site.xml:/usr/local/hadoop/etc/hadoop/yarn-site.xml:ro
    networks:
      - bigdata

  hive-metastore-db:
    image: postgres:12
    container_name: hive-metastore-db
    environment:
      - POSTGRES_DB=metastore
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hive
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 5s
      retries: 5
    networks:
      - bigdata

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionURL=jdbc:postgresql://hive-metastore-db:5432/metastore
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName=org.postgresql.Driver
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName=hive
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword=hive
      # - HIVE_SITE_CONF_datanucleus_schema_autoCreateAll=true
      # - HIVE_SITE_CONF_hive_metastore_schema_verification=false
      - SERVICE_NAME=metastore 
    # Añadimos el script para ejecutar el binario de hive para que levante el servicio Thrift
    volumes:
      - ./start-metastore.sh:/start-metastore.sh
    command: ["/bin/bash", "/start-metastore.sh"]
    ports:
      - "9083:9083" # Exponemos el puerto Thrift
    networks:
      - bigdata

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    depends_on:
      - hive-metastore
    environment:
      - SERVICE_NAME=hiveserver2
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HIVE_SITE_CONF_hive_metastore_uris=thrift://hive-metastore:9083
      - SERVICE_PRECONDITION=hive-metastore:9083
    ports:
      - "10000:10000" # Puerto para Beeline / JDBC
      - "10002:10002" # Interfaz web de Hive
    networks:
      - bigdata

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    hostname: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - bigdata

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: grafana
    hostname: grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - bigdata

networks:
  bigdata:
    driver: bridge

volumes:
  namenode_data:
  datanode1_data:
  datanode2_data:
  mysql_data:
  prometheus_data:
  grafana_data:
